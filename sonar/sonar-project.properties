# sonar-project.properties
# Configuración del proyecto en SonarCloud
# Docs: https://docs.sonarsource.com/sonarcloud/

# ── Identidad del proyecto ────────────────────────────────────────────────────
# Estos valores los obtienes al crear el proyecto en sonarcloud.io
sonar.projectKey=tu-org_oas-example-gen
sonar.organization=tu-org
sonar.projectName=OAS Example Generator — API Contract Quality
sonar.projectVersion=1.0.0

# ── Fuentes a analizar ────────────────────────────────────────────────────────
# Incluir el YAML del contrato Y el código TypeScript del generador
sonar.sources=.
sonar.inclusions=**/*.yaml,**/*.yml,**/*.ts,**/*.js
sonar.exclusions=**/node_modules/**,**/out/**,**/*.backup.yaml,**/test/**

# ── Issues externos (Spectral) ────────────────────────────────────────────────
# Este archivo lo genera el script spectral-to-sonar.js
sonar.externalIssuesReportPaths=sonar-issues.json

# ── TypeScript / JavaScript ───────────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=vscode-extension/tsconfig.json

# ── Encoding ──────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── Quality Gate personalizado ────────────────────────────────────────────────
# Configura en sonarcloud.io → Quality Gates:
#
# Condiciones sugeridas para API contracts:
#   - New Issues con severity CRITICAL    = 0   (bloqueante)
#   - New Issues tipo VULNERABILITY       = 0   (bloqueante)
#   - New Issues tipo BUG                 ≤ 2   (advertencia)
#   - New Code Coverage                   ≥ 70% (informativo)
#
# El pipeline de N8N consultará este Quality Gate via API:
#   GET https://sonarcloud.io/api/qualitygates/project_status?projectKey=...
